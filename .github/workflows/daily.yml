name: Steam每日榜单推送
on:
  schedule:
    # 这里是定时规则，默认每天早上8点（UTC时间0点，对应北京时间8点），你可以改时间
    - cron: '0 0 * * *'
  # 如果你需要手动触发，保留这个配置，改完代码可以点一下马上运行测试
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install requests
        run: pip install requests
      
      - name: Run steam push script
        run: python steam_push.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
