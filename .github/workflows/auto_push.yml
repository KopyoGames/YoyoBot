name: Auto Push Steam New & Trending

# 定时触发：每3天UTC时间0点执行，对应北京时间8点，可自行修改
on:
  schedule:
    - cron: '0 0 */3 * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run push task
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python steam_push.py
